
<script>

// =======================
// НАСТРОЙКИ
// =======================

const WEATHERAPI_KEY = "YOUR_API_KEY";

let currentSource = "openmeteo";
let forecastData = [];
let activeDayIndex = 0;

// =======================
// ТЕМЫ ПОГОДЫ
// =======================

const themes = {

    Clear: {
        background:
            "linear-gradient(135deg,#f59e0b,#fb923c,#0ea5e9)",

        icon:
            '<i class="fa-solid fa-sun text-yellow-200"></i>',

        effect:
            "sun",

        title:
            "Ясно"
    },

    Clouds: {
        background:
            "linear-gradient(135deg,#334155,#475569,#64748b)",

        icon:
            '<i class="fa-solid fa-cloud text-slate-100"></i>',

        effect:
            "clouds",

        title:
            "Облачно"
    },

    Rain: {
        background:
            "linear-gradient(135deg,#0f172a,#1e3a8a,#312e81)",

        icon:
            '<i class="fa-solid fa-cloud-rain text-sky-200"></i>',

        effect:
            "rain",

        title:
            "Дождь"
    },

    Snow: {
        background:
            "linear-gradient(135deg,#64748b,#94a3b8,#cbd5e1)",

        icon:
            '<i class="fa-solid fa-snowflake text-white"></i>',

        effect:
            "snow",

        title:
            "Снег"
    }
};

// =======================
// ПРИМЕНЕНИЕ ТЕМЫ
// =======================

function applyTheme(type){

    const theme =
        themes[type] || themes.Clouds;

    document.body.style.background =
        theme.background;

    document.getElementById("main-icon").innerHTML =
        theme.icon;

    document.getElementById("weather-badge").innerText =
        theme.title;

    renderEffects(theme.effect);
}

// =======================
// АНИМАЦИИ
// =======================

function renderEffects(effect){

    const container =
        document.getElementById("effects");

    container.innerHTML = "";

    // ---------- SUN ----------

    if(effect === "sun"){

        const glow =
            document.createElement("div");

        glow.style.cssText = `
            position:absolute;
            top:-150px;
            right:-150px;
            width:500px;
            height:500px;
            border-radius:50%;
            background:
                radial-gradient(circle,
                rgba(255,220,120,0.55),
                transparent 70%);
            animation:sunPulse 6s infinite ease-in-out;
        `;

        container.appendChild(glow);

        for(let i=0;i<12;i++){

            const ray =
                document.createElement("div");

            ray.style.cssText = `
                position:absolute;
                top:40px;
                right:40px;
                width:2px;
                height:240px;
                background:
                    linear-gradient(
                        transparent,
                        rgba(255,255,255,0.7),
                        transparent
                    );
                transform-origin:center bottom;
                transform:
                    rotate(${i * 30}deg);
                opacity:0.8;
            `;

            container.appendChild(ray);
        }
    }

    // ---------- RAIN ----------

    if(effect === "rain"){

        for(let i=0;i<90;i++){

            const drop =
                document.createElement("div");

            drop.className = "rain";

            drop.style.left =
                Math.random() * 100 + "%";

            drop.style.animationDuration =
                (0.5 + Math.random()) + "s";

            drop.style.animationDelay =
                Math.random() * 2 + "s";

            container.appendChild(drop);
        }

        const flash =
            document.createElement("div");

        flash.className = "lightning";

        container.appendChild(flash);
    }

    // ---------- SNOW ----------

    if(effect === "snow"){

        for(let i=0;i<50;i++){

            const snow =
                document.createElement("div");

            snow.className = "snow";

            const size =
                4 + Math.random() * 6;

            snow.style.width =
                size + "px";

            snow.style.height =
                size + "px";

            snow.style.left =
                Math.random() * 100 + "%";

            snow.style.animationDuration =
                (4 + Math.random() * 5) + "s";

            snow.style.animationDelay =
                Math.random() * 4 + "s";

            container.appendChild(snow);
        }
    }

    // ---------- CLOUDS ----------

    if(effect === "clouds"){

        for(let i=0;i<8;i++){

            const cloud =
                document.createElement("div");

            cloud.className = "cloud";

            cloud.style.top =
                40 + i * 70 + "px";

            cloud.style.width =
                180 + Math.random() * 160 + "px";

            cloud.style.height =
                70 + Math.random() * 40 + "px";

            cloud.style.animationDuration =
                35 + Math.random() * 20 + "s";

            cloud.style.opacity =
                0.08 + Math.random() * 0.08;

            container.appendChild(cloud);
        }
    }
}

// =======================
// ВЫБОР ДНЯ
// =======================

function selectDay(index){

    activeDayIndex = index;

    const day =
        forecastData[index];

    updateMain(day);

    applyTheme(day.type);

    document
        .querySelectorAll(".forecast-item")
        .forEach(el => el.classList.remove("active"));

    document
        .querySelectorAll(".forecast-item")[index]
        .classList.add("active");
}

// =======================
// РЕНДЕР ПРОГНОЗА
// =======================

function renderForecast(){

    const container =
        document.getElementById("forecast");

    container.innerHTML = "";

    forecastData.forEach((day,index) => {

        const theme =
            themes[day.type];

        const item =
            document.createElement("button");

        item.className =
            "forecast-item";

        item.onclick =
            () => selectDay(index);

        item.innerHTML = `

            <div class="forecast-left">

                <div class="forecast-day">
                    ${day.day}
                </div>

                <div class="forecast-date">
                    ${day.date}
                </div>

            </div>

            <div class="forecast-center">
                ${theme.icon}
            </div>

            <div class="forecast-right">

                <div class="forecast-max">
                    ${day.max}°
                </div>

                <div class="forecast-min">
                    ${day.min}°
                </div>

            </div>

        `;

        container.appendChild(item);
    });

    selectDay(0);
}

// =======================
// ОСНОВНОЙ UI
// =======================

function updateMain(w){

    document.getElementById("temp").innerText =
        w.temp;

    document.getElementById("desc").innerText =
        w.desc;

    document.getElementById("feels").innerText =
        w.feels + "°";

    document.getElementById("humidity").innerText =
        w.humidity + "%";

    document.getElementById("wind").innerText =
        w.wind + " м/с";

    document.getElementById("pressure").innerText =
        w.pressure + " мм";
}

// =======================
// OPEN METEO
// =======================

async function loadOpenMeteo(lat,lon){

    const url =
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=10`;

    const response =
        await fetch(url);

    const data =
        await response.json();

    const geo =
        await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ru`
        );

    const geoData =
        await geo.json();

    const city =
        geoData.address.city ||
        geoData.address.town ||
        geoData.address.state ||
        "Неизвестно";

    document.getElementById("city").innerText =
        city;

    forecastData = [];

    for(let i=0;i<data.daily.time.length;i++){

        const code =
            data.daily.weather_code[i];

        let type =
            "Clouds";

        if(code === 0)
            type = "Clear";

        else if(
            [61,63,65,80,81,82]
            .includes(code)
        )
            type = "Rain";

        else if(
            [71,73,75,77,85,86]
            .includes(code)
        )
            type = "Snow";

        forecastData.push({

            type,

            day:
                new Date(data.daily.time[i])
                .toLocaleDateString(
                    "ru-RU",
                    { weekday:"long" }
                ),

            date:
                new Date(data.daily.time[i])
                .toLocaleDateString(
                    "ru-RU",
                    {
                        day:"numeric",
                        month:"long"
                    }
                ),

            max:
                Math.round(
                    data.daily.temperature_2m_max[i]
                ),

            min:
                Math.round(
                    data.daily.temperature_2m_min[i]
                ),

            temp:
                Math.round(
                    data.daily.temperature_2m_max[i]
                ),

            feels:
                Math.round(
                    data.current.apparent_temperature
                ),

            humidity:
                data.current.relative_humidity_2m,

            wind:
                Math.round(
                    data.current.wind_speed_10m
                ),

            pressure:
                Math.round(
                    data.current.surface_pressure * 0.75
                ),

            desc:
                themes[type].title
        });
    }

    renderForecast();
}

// =======================
// WEATHER API
// =======================

async function loadWeatherApi(lat,lon){

    const url =
`https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${lat},${lon}&days=10&lang=ru`;

    const response =
        await fetch(url);

    const data =
        await response.json();

    document.getElementById("city").innerText =
        data.location.name;

    forecastData =
        data.forecast.forecastday.map(day => {

            const code =
                day.day.condition.code;

            let type =
                "Clouds";

            if(code === 1000)
                type = "Clear";

            else if(
                [
                    1063,1180,1183,
                    1186,1189,1192,
                    1195,1240,1243
                ].includes(code)
            )
                type = "Rain";

            else if(
                [
                    1066,1210,1213,
                    1216,1219,1222,
                    1225
                ].includes(code)
            )
                type = "Snow";

            return {

                type,

                day:
                    new Date(day.date)
                    .toLocaleDateString(
                        "ru-RU",
                        { weekday:"long" }
                    ),

                date:
                    new Date(day.date)
                    .toLocaleDateString(
                        "ru-RU",
                        {
                            day:"numeric",
                            month:"long"
                        }
                    ),

                max:
                    Math.round(day.day.maxtemp_c),

                min:
                    Math.round(day.day.mintemp_c),

                temp:
                    Math.round(day.day.avgtemp_c),

                feels:
                    Math.round(day.day.avgtemp_c),

                humidity:
                    day.day.avghumidity,

                wind:
                    Math.round(day.day.maxwind_kph / 3.6),

                pressure:
                    "--",

                desc:
                    day.day.condition.text
            };
        });

    renderForecast();
}

</script>
