<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая Погода Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Анимации эффектов */
        @keyframes snowfall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 1; }
            100% { transform: translateY(100vh) translateX(50px); opacity: 0.3; }
        }
        @keyframes rainfall {
            0% { transform: translateY(-10vh); opacity: 0.6; }
            100% { transform: translateY(100vh); opacity: 0.1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes lightning {
            0%, 93%, 95%, 97%, 100% { opacity: 0; }
            94%, 96% { opacity: 0.3; }
        }
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .snowflake {
            position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%;
            animation: snowfall linear infinite; pointer-events: none;
        }
        .raindrop {
            position: absolute; width: 1px; height: 25px; background: linear-gradient(transparent, #a5f3fc);
            animation: rainfall linear infinite; pointer-events: none;
        }
        .lightning-flash {
            position: absolute; inset: 0; background: white; opacity: 0;
            animation: lightning 5s ease-in-out infinite; pointer-events: none; z-index: 1;
        }
        .sun-rays {
            position: absolute; top: -50px; left: -50px; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(253,224,71,0.4) 0%, rgba(253,224,71,0) 70%);
            animation: spin-slow 20s linear infinite; pointer-events: none; z-index: 0;
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .weather-card { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.12); transition: all 0.5s ease; }
        .forecast-item { transition: all 0.3s ease; }
        .forecast-item:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(5px); }
        .forecast-item.active { background: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4 md:p-8 transition-all duration-1000 font-sans text-white bg-gradient-to-br from-slate-800 to-slate-900 overflow-x-hidden relative">

    <div id="effects-container" class="absolute inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <div class="w-full max-w-4xl z-10 flex flex-col gap-6">
        
        <div id="status-panel" class="weather-card p-4 rounded-2xl border border-white/10 shadow-lg flex justify-between items-center">
            <div class="text-sm font-medium flex items-center gap-2">
                <i class="fa-solid fa-location-crosshairs text-sky-400"></i>
                <span id="location-status">Определение геопозиции...</span>
            </div>
            <div class="text-xs opacity-60 flex items-center gap-1.5" id="status-text">
                <i class="fa-solid fa-circle-notch animate-spin"></i> Запуск систем...
            </div>
        </div>

        <div id="weather-app" class="weather-card rounded-3xl p-6 md:p-8 shadow-2xl border border-white/20 opacity-0 transition-all duration-700 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h1 id="city-name" class="text-3xl font-extrabold tracking-tight drop-shadow-sm">---</h1>
                            <p id="current-date" class="text-sm opacity-80 mt-1">---</p>
                        </div>
                        <span id="weather-status-badge" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-white/20">
                            ---
                        </span>
                    </div>

                    <div class="flex items-center gap-6 my-6">
                        <div id="weather-icon-container" class="text-7xl md:text-8xl animate-float filter drop-shadow-[0_8px_16px_rgba(0,0,0,0.25)] relative">
                            <i class="fa-solid fa-cloud-sun"></i>
                        </div>
                        <div>
                            <div class="text-6xl md:text-7xl font-black tracking-tighter relative inline-block">
                                <span id="temp-display">--</span><span class="text-3xl absolute -top-1 -right-5">°</span>
                            </div>
                            <p id="weather-desc" class="text-lg font-medium capitalize mt-1 opacity-90">---</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 rounded-2xl p-3.5 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-amber-300"><i class="fa-solid fa-temperature-half"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Ощущается</p>
                            <p id="feels-like" class="text-base font-semibold">-- °C</p>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3.5 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-blue-300"><i class="fa-solid fa-droplet"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Влажность</p>
                            <p id="humidity" class="text-base font-semibold">-- %</p>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3.5 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-teal-300"><i class="fa-solid fa-wind"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Ветер</p>
                            <p id="wind-speed" class="text-base font-semibold">-- м/с</p>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3.5 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-rose-300"><i class="fa-solid fa-gauge-high"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Давление</p>
                            <p id="pressure" class="text-base font-semibold">-- мм</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div id="forecast-container" class="weather-card rounded-3xl p-6 border border-white/10 opacity-0 transition-all duration-700 hidden">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-calendar-days text-sky-400"></i> Прогноз погоды (Нажмите на день для просмотра анимации)
            </h2>
            
            <div id="forecast-days" class="flex flex-col gap-2.5">
                </div>
        </div>

        <div class="flex justify-center items-center mt-4 weather-card p-4 rounded-2xl border border-white/10 shadow-lg">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-database text-sky-400 text-base"></i>
                <span class="text-xs font-semibold opacity-80">Источник:</span>
                <div class="inline-flex rounded-xl bg-black/20 p-1 border border-white/5">
                    <button id="src-weatherapi" onclick="switchSource('weatherapi')" class="px-3 py-1 rounded-lg text-xs font-bold transition cursor-pointer bg-sky-500 text-white shadow">
                        WeatherAPI
                    </button>
                    <button id="src-openmeteo" onclick="switchSource('openmeteo')" class="px-3 py-1 rounded-lg text-xs font-bold transition cursor-pointer text-white/60 hover:text-white">
                        Open-Meteo
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Конфигурация. Токен WeatherAPI зашит для демонстрации, рекомендуется проксирование.
        const WEATHERAPI_KEY = "3eee539d70ae4d4183a162401262705";
        
        // Дефолтные координаты Симферополя
        const DEFAULT_COORDS = { lat: 44.952117, lon: 34.102417, name: "Симферополь (Крым)" };
        
        let currentSource = 'weatherapi'; 
        let currentCoords = null;
        let globalForecastData = []; 
        let currentCityName = "";

        // Темы оформления под типы условий погоды
        const weatherThemes = {
            Clear: { bg: "from-amber-500 via-orange-500 to-sky-600", icon: '<i class="fa-solid fa-sun text-amber-200"></i>', badge: "bg-amber-500/30 text-amber-100", effect: "sun", name: "Ясно" },
            Clouds: { bg: "from-sky-500 via-slate-500 to-slate-700", icon: '<i class="fa-solid fa-cloud text-slate-100"></i>', badge: "bg-slate-500/30 text-slate-100", effect: "none", name: "Облачно" },
            Rain: { bg: "from-slate-700 via-blue-800 to-indigo-950", icon: '<i class="fa-solid fa-cloud-showers-heavy text-blue-300"></i>', badge: "bg-blue-500/30 text-blue-100", effect: "rain", name: "Дождь" },
            Snow: { bg: "from-blue-900 via-indigo-950 to-slate-800", icon: '<i class="fa-solid fa-snowflake text-sky-200"></i>', badge: "bg-sky-500/30 text-sky-100", effect: "snow", name: "Снег" }
        };

        // Автоматический запуск при загрузке страницы
        window.addEventListener('DOMContentLoaded', () => {
            initWeatherAutomatically();
        });

        function initWeatherAutomatically() {
            setStatus("Запрос геолокации...", true);
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async position => {
                        currentCoords = { lat: position.coords.latitude, lon: position.coords.longitude };
                        document.getElementById('location-status').innerText = "Геопозиция определена";
                        await fetchCityName(currentCoords.lat, currentCoords.lon);
                        fetchWeatherData(currentCoords.lat, currentCoords.lon);
                    },
                    error => {
                        console.warn("Геолокация отклонена или недоступна. Включаем Симферополь.");
                        useDefaultLocation("Доступ к геопозиции ограничен");
                    },
                    { timeout: 5000 }
                );
            } else {
                useDefaultLocation("Геолокация не поддерживается");
            }
        }

        function useDefaultLocation(reason) {
            currentCoords = { lat: DEFAULT_COORDS.lat, lon: DEFAULT_COORDS.lon };
            currentCityName = DEFAULT_COORDS.name;
            document.getElementById('location-status').innerText = `${reason}. Город по умолчанию.`;
            fetchWeatherData(currentCoords.lat, currentCoords.lon);
        }

        // Обратный геокодинг на русском для Open-Meteo и дефолта
        async function fetchCityName(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru`);
                if (res.ok) {
                    const data = await res.json();
                    currentCityName = data.address.city || data.address.town || data.address.village || data.address.county || "Текущая геопозиция";
                } else {
                    currentCityName = "Текущая геопозиция";
                }
            } catch (e) {
                currentCityName = "Текущая геопозиция";
            }
        }

        function switchSource(source) {
            if (currentSource === source) return;
            currentSource = source;
            
            const btnApi = document.getElementById('src-weatherapi');
            const btnMeteo = document.getElementById('src-openmeteo');
            if (source === 'weatherapi') {
                btnApi.className = "px-3 py-1 rounded-lg text-xs font-bold transition cursor-pointer bg-sky-500 text-white shadow";
                btnMeteo.className = "px-3 py-1 rounded-lg text-xs font-bold transition cursor-pointer text-white/60 hover:text-white";
            } else {
                btnMeteo.className = "px-3 py-1 rounded-lg text-xs font-bold transition cursor-pointer bg-sky-500 text-white shadow";
                btnApi.className = "px-3 py-1 rounded-lg text-xs font-bold transition cursor-pointer text-white/60 hover:text-white";
            }

            if (currentCoords) {
                fetchWeatherData(currentCoords.lat, currentCoords.lon);
            }
        }

        function setStatus(text, spin) {
            const statusEl = document.getElementById('status-text');
            statusEl.innerHTML = `${spin ? '<i class="fa-solid fa-circle-notch animate-spin text-sky-400"></i>' : '<i class="fa-solid fa-circle text-emerald-400"></i>'} ${text}`;
        }

        async function fetchWeatherData(lat, lon) {
            setStatus(`Запрос к ${currentSource === 'weatherapi' ? 'WeatherAPI' : 'Open-Meteo'}...`, true);
            try {
                if (currentSource === 'weatherapi') {
                    await fetchFromWeatherApi(lat, lon);
                } else {
                    await fetchFromOpenMeteo(lat, lon);
                }
                
                // Плавно показываем интерфейс приложения после первой загрузки данных
                const appCard = document.getElementById('weather-app');
                const forecastCard = document.getElementById('forecast-container');
                appCard.classList.remove('hidden');
                forecastCard.classList.remove('hidden');
                setTimeout(() => {
                    appCard.classList.add('opacity-100');
                    forecastCard.classList.add('opacity-100');
                }, 50);

                setStatus("Данные обновлены", false);
            } catch (err) {
                console.error(err);
                setStatus("Ошибка обновления данных", false);
            }
        }

        async function fetchFromWeatherApi(lat, lon) {
            const url = `https://api.weatherapi.com/v1/forecast.json?key=${WEATHERAPI_KEY}&q=${lat},${lon}&days=10&lang=ru`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("WeatherAPI error");
            const data = await response.json();

            // Переопределяем имя города на русском из WeatherAPI
            currentCityName = data.location.name === "Simferopol" ? "Симферополь (Крым)" : data.location.name;

            globalForecastData = data.forecast.forecastday.map((day, idx) => {
                const code = idx === 0 ? data.current.condition.code : day.day.condition.code;
                let type = 'Clouds';
                if (code === 1000) type = 'Clear';
                else if ([1063, 1150, 1153, 1180, 1183, 1186, 1189, 1192, 1195, 1240, 1243, 1246, 1087, 1273, 1276].includes(code)) type = 'Rain';
                else if ([1066, 1114, 1210, 1213, 1216, 1219, 1222, 1225, 1255, 1258, 1279, 1282].includes(code)) type = 'Snow';

                return {
                    isCurrent: idx === 0,
                    city: currentCityName,
                    dateStr: new Date(day.date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }),
                    dayName: new Date(day.date).toLocaleDateString('ru-RU', { weekday: 'long' }),
                    temp: idx === 0 ? Math.round(data.current.temp_c) : Math.round(day.day.avgtemp_c),
                    maxTemp: Math.round(day.day.maxtemp_c),
                    minTemp: Math.round(day.day.mintemp_c),
                    desc: idx === 0 ? data.current.condition.text : day.day.condition.text,
                    feels: idx === 0 ? Math.round(data.current.feelslike_c) : Math.round(day.day.avgtemp_c),
                    humidity: idx === 0 ? data.current.humidity : day.day.avghumidity,
                    wind: idx === 0 ? Number((data.current.wind_kph / 3.6).toFixed(1)) : Number((day.day.maxwind_kph / 3.6).toFixed(1)),
                    pressure: idx === 0 ? Math.round(data.current.pressure_mb * 0.750062) : 750, // у дней нет давления в базовом API
                    type: type
                };
            });

            // Автоматически отображаем текущий (0-й) день
            updateWeatherUI(0);
            renderForecastList();
        }

        async function fetchFromOpenMeteo(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure&daily=weather_code,temperature_2m_max,temperature_2m_min,temperature_2m_mean,relative_humidity_2m_mean,wind_speed_10m_max,precipitation_probability_max&wind_speed_unit=ms&pressure_unit=hpa&timezone=auto&forecast_days=10`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("OpenMeteo error");
            const data = await response.json();

            function parseWmoCode(code) {
                if (code === 0) return { type: 'Clear', desc: 'Ясно' };
                if ([1, 2, 3, 45, 48].includes(code)) return { type: 'Clouds', desc: 'Облачно' };
                if ([51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code)) return { type: 'Дождь / Гроза', type: 'Rain' };
                if ([71, 73, 75, 77, 85, 86].includes(code)) return { type: 'Snow', desc: 'Снегопад' };
                return { type: 'Clouds', desc: 'Облачно' };
            }

            globalForecastData = data.daily.time.map((time, idx) => {
                const isCurrent = idx === 0;
                const parsedCondition = parseWmoCode(data.daily.weather_code[idx]);
                const currentCondition = isCurrent ? parseWmoCode(data.current.weather_code) : parsedCondition;

                return {
                    isCurrent: isCurrent,
                    city: currentCityName,
                    dateStr: new Date(time).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }),
                    dayName: new Date(time).toLocaleDateString('ru-RU', { weekday: 'long' }),
                    temp: isCurrent ? Math.round(data.current.temperature_2m) : Math.round(data.daily.temperature_2m_mean[idx]),
                    maxTemp: Math.round(data.daily.temperature_2m_max[idx]),
                    minTemp: Math.round(data.daily.temperature_2m_min[idx]),
                    desc: isCurrent ? currentCondition.desc : parsedCondition.desc,
                    feels: isCurrent ? Math.round(data.current.apparent_temperature) : Math.round(data.daily.temperature_2m_mean[idx]),
                    humidity: isCurrent ? data.current.relative_humidity_2m : Math.round(data.daily.relative_humidity_2m_mean[idx]),
                    wind: isCurrent ? Number(data.current.wind_speed_10m.toFixed(1)) : Number(data.daily.wind_speed_10m_max[idx].toFixed(1)),
                    pressure: isCurrent ? Math.round(data.current.surface_pressure * 0.750062) : 750,
                    type: isCurrent ? currentCondition.type : parsedCondition.type
                };
            });

            updateWeatherUI(0);
            renderForecastList();
        }

        // Плавное обновление основного интерфейса при выборе дня
        function updateWeatherUI(index) {
            const w = globalForecastData[index];
            if (!w) return;

            const theme = weatherThemes[w.type] || weatherThemes.Clouds;
            
            // Плавная смена градиентного фона всей страницы
            document.body.className = `min-h-screen flex flex-col items-center justify-start p-4 md:p-8 transition-all duration-1000 font-sans text-white overflow-x-hidden relative bg-gradient-to-br ${theme.bg}`;
            
            document.getElementById('city-name').innerText = w.city;
            document.getElementById('current-date').innerText = `${w.dayName}, ${w.dateStr}`;
            document.getElementById('temp-display').innerText = w.temp;
            document.getElementById('weather-desc').innerText = w.desc;
            document.getElementById('feels-like').innerText = `${w.feels} °C`;
            document.getElementById('humidity').innerText = `${w.humidity} %`;
            document.getElementById('wind-speed').innerText = `${w.wind} м/с`;
            document.getElementById('pressure').innerText = `${w.pressure} мм`;

            const badge = document.getElementById('weather-status-badge');
            badge.innerText = theme.name;
            badge.className = `inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider ${theme.badge}`;
            
            document.getElementById('weather-icon-container').innerHTML = theme.icon;

            // Генерация частиц осадков/эффектов под выбранный день
            generateParticles(theme.effect);

            // Подсветка активного дня в списке
            document.querySelectorAll('.forecast-item').forEach((item, idx) => {
                if (idx === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // Отрисовка вертикального списка дней
        function renderForecastList() {
            const container = document.getElementById('forecast-days');
            container.innerHTML = '';

            globalForecastData.forEach((day, index) => {
                const theme = weatherThemes[day.type] || weatherThemes.Clouds;
                
                const row = document.createElement('button');
                row.onclick = () => updateWeatherUI(index);
                row.className = "forecast-item w-full bg-white/5 border border-white/5 p-4 rounded-2xl flex items-center justify-between gap-4 transition text-left cursor-pointer";
                
                row.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-2xl w-10 text-center filter drop-shadow-sm">${theme.icon}</div>
                        <div>
                            <span class="block text-sm font-bold capitalize">${day.dayName}</span>
                            <span class="block text-xs opacity-60">${day.dateStr} — ${day.desc}</span>
                        </div>
                    </div>
                    <div class="text-right whitespace-nowrap">
                        <span class="text-base font-black text-amber-300">${day.maxTemp}°</span>
                        <span class="text-xs opacity-40 mx-1">/</span>
                        <span class="text-sm font-semibold opacity-60 text-blue-200">${day.minTemp}°</span>
                    </div>
                `;
                container.appendChild(row);
            });

            // Устанавливаем первый элемент активным визуально
            if(container.firstChild) container.firstChild.classList.add('active');
        }

        // Процедурные эффекты (Лучи солнца, дождь, снег, молния)
        function generateParticles(effectType) {
            const container = document.getElementById('effects-container');
            container.innerHTML = '';
            if (effectType === 'none') return;

            // 1. Солнечные лучи
            if (effectType === 'sun') {
                const rays = document.createElement('div');
                rays.className = 'sun-rays';
                container.appendChild(rays);
            }

            // 2. Грозовые вспышки для дождя
            if (effectType === 'rain') {
                const flash = document.createElement('div');
                flash.className = 'lightning-flash';
                container.appendChild(flash);
            }

            // 3. Частицы осадков (дождь или снег)
            if (effectType === 'rain' || effectType === 'snow') {
                const particleCount = effectType === 'rain' ? 60 : 30;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = effectType === 'rain' ? 'raindrop' : 'snowflake';
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * -15}%`;
                    particle.style.animationDuration = effectType === 'rain' ? `${0.4 + Math.random() * 0.4}s` : `${2.5 + Math.random() * 3.5}s`;
                    particle.style.animationDelay = `${Math.random() * 2}s`;
                    
                    if (effectType === 'snow') {
                        const size = 3 + Math.random() * 4;
                        particle.style.width = `${size}px`;
                        particle.style.height = `${size}px`;
                    }
                    container.appendChild(particle);
                }
            }
        }
    </script>
</body>
</html>
