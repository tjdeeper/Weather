<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая Погода</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome для красивых погодных иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Анимации для погодных эффектов */
        @keyframes snowfall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 1; }
            100% { transform: translateY(100vh) translateX(50px); opacity: 0.3; }
        }
        @keyframes rainfall {
            0% { transform: translateY(-10vh); opacity: 0.6; }
            100% { transform: translateY(100vh); opacity: 0.1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes lightning {
            0%, 95%, 98%, 100% { opacity: 0; }
            96%, 99% { opacity: 0.2; }
        }
        .snowflake {
            position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%;
            animation: snowfall linear infinite; pointer-events: none;
        }
        .raindrop {
            position: absolute; width: 1px; height: 25px; background: linear-gradient(transparent, #a5f3fc);
            animation: rainfall linear infinite; pointer-events: none;
        }
        .lightning-flash {
            position: absolute; inset: 0; background: white; opacity: 0;
            animation: lightning 6s ease-in-out infinite; pointer-events: none; z-index: 1;
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .weather-card { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.12); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-1000 font-sans text-white bg-gradient-to-br from-slate-800 to-slate-900 overflow-hidden relative">

    <!-- Контейнер для динамических осадков и вспышек -->
    <div id="effects-container" class="absolute inset-0 pointer-events-none z-0"></div>

    <!-- ГЛАВНЫЙ ВИДЖЕТ ПОГОДЫ -->
    <div id="weather-app" class="w-full max-w-md weather-card rounded-3xl p-6 shadow-2xl border border-white/20 z-10 hidden transition-all duration-500">
        
        <!-- Локация и Статус -->
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 id="city-name" class="text-3xl font-bold tracking-tight drop-shadow-sm">---</h1>
                <p id="current-date" class="text-sm opacity-80 mt-1">---</p>
            </div>
            <div>
                <span id="weather-status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium uppercase tracking-wider bg-white/20">
                    Загрузка
                </span>
            </div>
        </div>

        <!-- Температура и большая иконка -->
        <div class="flex flex-col items-center my-6">
            <div id="weather-icon-container" class="text-8xl mb-4 animate-float filter drop-shadow-[0_8px_16px_rgba(0,0,0,0.25)]">
                <i class="fa-solid fa-cloud-sun"></i>
            </div>
            <div class="text-center">
                <div class="text-7xl font-extrabold tracking-tighter relative inline-block">
                    <span id="temp-display">--</span><span class="text-4xl absolute -top-2 -right-6">°</span>
                </div>
                <p id="weather-desc" class="text-xl font-medium capitalize mt-2 opacity-90">Определение координат...</p>
            </div>
        </div>

        <hr class="border-white/10 my-6">

        <!-- Дополнительные параметры -->
        <div class="grid grid-cols-2 gap-4">
            <!-- Ощущается как -->
            <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                <div class="text-xl opacity-80 w-8 text-center text-amber-300"><i class="fa-solid fa-temperature-half"></i></div>
                <div>
                    <p class="text-xs opacity-60 font-medium">Ощущается</p>
                    <p id="feels-like" class="text-base font-semibold">-- °C</p>
                </div>
            </div>
            <!-- Влажность -->
            <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                <div class="text-xl opacity-80 w-8 text-center text-blue-300"><i class="fa-solid fa-droplet"></i></div>
                <div>
                    <p class="text-xs opacity-60 font-medium">Влажность</p>
                    <p id="humidity" class="text-base font-semibold">-- %</p>
                </div>
            </div>
            <!-- Ветер -->
            <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                <div class="text-xl opacity-80 w-8 text-center text-teal-300"><i class="fa-solid fa-wind"></i></div>
                <div>
                    <p class="text-xs opacity-60 font-medium">Ветер</p>
                    <p id="wind-speed" class="text-base font-semibold">-- м/с</p>
                </div>
            </div>
            <!-- Давление -->
            <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                <div class="text-xl opacity-80 w-8 text-center text-rose-300"><i class="fa-solid fa-gauge-high"></i></div>
                <div>
                    <p class="text-xs opacity-60 font-medium">Давление</p>
                    <p id="pressure" class="text-base font-semibold">-- мм</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Стартовый экран запроса геопозиции -->
    <div id="welcome-card" class="w-full max-w-md weather-card rounded-3xl p-8 text-center border border-white/20 z-10 shadow-2xl">
        <div class="text-6xl mb-4 text-sky-400"><i class="fa-solid fa-location-dot animate-bounce"></i></div>
        <h2 class="text-2xl font-bold mb-2">Гео-Погода</h2>
        <p class="text-sm opacity-80 mb-6">Приложению требуется доступ к вашей геолокации для отображения точной погоды за окном.</p>
        <button onclick="initWeather()" class="w-full bg-white text-slate-950 font-bold py-3.5 px-6 rounded-2xl transition hover:bg-opacity-95 active:scale-[0.98] shadow-xl cursor-pointer">
            Разрешить доступ и запустить
        </button>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ API (OpenWeatherMap)
        // ==========================================
        const API_KEY = "842e2ae6109006861626d9ddc718429c"; 

        const weatherThemes = {
            Clear: {
                bg: "from-amber-400 via-orange-500 to-sky-600",
                icon: '<i class="fa-solid fa-sun text-amber-300"></i>',
                badge: "bg-amber-500/30 text-amber-100",
                effect: "none",
                nameRu: "Ясно"
            },
            Clouds: {
                bg: "from-sky-400 via-slate-500 to-slate-700",
                icon: '<i class="fa-solid fa-cloud text-slate-100"></i>',
                badge: "bg-slate-500/30 text-slate-100",
                effect: "none",
                nameRu: "Облачно"
            },
            Rain: {
                bg: "from-slate-700 via-blue-800 to-indigo-950",
                icon: '<i class="fa-solid fa-cloud-showers-heavy text-blue-300"></i>',
                badge: "bg-blue-500/30 text-blue-100",
                effect: "rain",
                nameRu: "Дождь"
            },
            Snow: {
                bg: "from-blue-900 via-indigo-950 to-slate-800",
                icon: '<i class="fa-solid fa-snowflake text-sky-200"></i>',
                badge: "bg-sky-500/30 text-sky-100",
                effect: "snow",
                nameRu: "Снег"
            }
        };

        function initWeather() {
            document.getElementById('welcome-card').classList.add('hidden');
            document.getElementById('weather-app').classList.remove('hidden');
            
            updateDate();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        fetchRealWeather(position.coords.latitude, position.coords.longitude);
                    },
                    error => {
                        document.getElementById('weather-desc').innerText = "Доступ к геолокации отклонен.";
                        console.error("Геопозиция недоступна.");
                    }
                );
            } else {
                document.getElementById('weather-desc').innerText = "Браузер не поддерживает геолокацию.";
            }
        }

        function updateDate() {
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('ru-RU', options);
        }

        async function fetchRealWeather(lat, lon) {
            try {
                document.getElementById('weather-desc').innerText = "Получение данных...";
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ru`);
                
                if (!response.ok) throw new Error('Ошибка запроса к API');
                const data = await response.json();
                
                let themeType = 'Clouds';
                const main = data.weather[0].main;
                
                if (main === 'Clear') themeType = 'Clear';
                else if (['Rain', 'Drizzle', 'Thunderstorm'].includes(main)) themeType = 'Rain';
                else if (main === 'Snow') themeType = 'Snow';

                const pressureMm = Math.round(data.main.pressure * 0.750062);

                updateUI(
                    data.name,
                    Math.round(data.main.temp),
                    themeType,
                    data.weather[0].description,
                    Math.round(data.main.feels_like),
                    data.main.humidity,
                    data.wind.speed,
                    pressureMm
                );
            } catch (err) {
                console.error(err);
                document.getElementById('weather-desc').innerText = "Ошибка загрузки данных.";
            }
        }

        function updateUI(city, temp, type, desc, feels, humidity, wind, pressure) {
            const theme = weatherThemes[type] || weatherThemes.Clouds;

            document.body.className = `min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-1000 font-sans text-white overflow-hidden relative bg-gradient-to-br ${theme.bg}`;

            document.getElementById('city-name').innerText = city;
            document.getElementById('temp-display').innerText = temp;
            document.getElementById('weather-desc').innerText = desc;
            document.getElementById('feels-like').innerText = `${feels} °C`;
            document.getElementById('humidity').innerText = `${humidity} %`;
            document.getElementById('wind-speed').innerText = `${wind} м/с`;
            document.getElementById('pressure').innerText = `${pressure} мм`;

            const badge = document.getElementById('weather-status-badge');
            badge.innerText = theme.nameRu;
            badge.className = `inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium uppercase tracking-wider ${theme.badge}`;
            
            document.getElementById('weather-icon-container').innerHTML = theme.icon;

            generateParticles(theme.effect);
        }

        function generateParticles(effectType) {
            const container = document.getElementById('effects-container');
            container.innerHTML = '';

            if (effectType === 'none') return;

            if (effectType === 'rain') {
                const flash = document.createElement('div');
                flash.className = 'lightning-flash';
                container.appendChild(flash);
            }

            const particleCount = effectType === 'rain' ? 70 : 40;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = effectType === 'rain' ? 'raindrop' : 'snowflake';
                
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * -20}%`;
                particle.style.animationDuration = effectType === 'rain' ? `${0.4 + Math.random() * 0.4}s` : `${2.5 + Math.random() * 3.5}s`;
                particle.style.animationDelay = `${Math.random() * 2}s`;
                
                if (effectType === 'snow') {
                    const size = 3 + Math.random() * 4;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                }

                container.appendChild(particle);
            }
        }
    </script>
</body>
</html>
