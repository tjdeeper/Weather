<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая Погода Pro v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Анимации эффектов окружающей среды */
        @keyframes snowfall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 1; }
            100% { transform: translateY(100vh) translateX(50px); opacity: 0.3; }
        }
        @keyframes rainfall {
            0% { transform: translateY(-10vh); opacity: 0.6; }
            100% { transform: translateY(100vh); opacity: 0.1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes lightning {
            0%, 93%, 95%, 97%, 100% { opacity: 0; }
            94%, 96% { opacity: 0.3; }
        }
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .snowflake {
            position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%;
            animation: snowfall linear infinite; pointer-events: none;
        }
        .raindrop {
            position: absolute; width: 1px; height: 25px; background: linear-gradient(transparent, #a5f3fc);
            animation: rainfall linear infinite; pointer-events: none;
        }
        .lightning-flash {
            position: absolute; inset: 0; background: white; opacity: 0;
            animation: lightning 5s ease-in-out infinite; pointer-events: none; z-index: 1;
        }
        .sun-rays {
            position: absolute; top: -50px; left: -50px; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(253,224,71,0.4) 0%, rgba(253,224,71,0) 70%);
            animation: spin-slow 20s linear infinite; pointer-events: none; z-index: 0;
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .weather-card { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.12); transition: all 0.5s ease; }
        .forecast-item { transition: all 0.3s ease; }
        .forecast-item:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(5px); }
        .forecast-item.active { background: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.4); }
        
        .hourly-scroll::-webkit-scrollbar { height: 6px; }
        .hourly-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4 md:p-8 transition-all duration-1000 font-sans text-white bg-gradient-to-br from-slate-800 to-slate-900 overflow-x-hidden relative">

    <div id="effects-container" class="absolute inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <div class="w-full max-w-4xl z-10 flex flex-col gap-5">
        
        <div class="weather-card p-3 rounded-2xl border border-white/10 shadow-lg flex flex-col sm:flex-row gap-3 justify-between items-center">
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <button onclick="initWeatherAutomatically()" class="p-2 bg-white/10 hover:bg-white/20 active:scale-95 rounded-xl transition cursor-pointer" title="Определить по GPS">
                    <i id="gps-icon" class="fa-solid fa-location-crosshairs text-sky-400"></i>
                </button>
                <div class="text-sm font-medium overflow-hidden text-ellipsis whitespace-nowrap">
                    <span id="location-status">Подготовка системы...</span>
                </div>
            </div>
            
            <form id="search-form" onsubmit="handleSearch(event)" class="flex w-full sm:w-auto max-w-md items-center gap-2">
                <input type="text" id="search-input" placeholder="Поиск города..." class="w-full sm:w-64 bg-black/20 border border-white/10 rounded-xl px-3 py-1.5 text-sm focus:outline-none focus:border-sky-400 placeholder-white/50 text-white">
                <button type="submit" class="px-3 py-1.5 bg-sky-500 hover:bg-sky-600 active:scale-95 text-sm font-bold rounded-xl transition cursor-pointer">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        </div>

        <div id="weather-app" class="weather-card rounded-3xl p-6 md:p-8 shadow-2xl border border-white/20 opacity-0 transition-all duration-700 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h1 id="city-name" class="text-3xl font-extrabold tracking-tight drop-shadow-sm">---</h1>
                            <p id="current-date" class="text-sm opacity-80 mt-1">---</p>
                        </div>
                        <span id="weather-status-badge" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-white/20">
                            ---
                        </span>
                    </div>

                    <div class="flex items-center gap-6 my-4">
                        <div id="weather-icon-container" class="text-7xl md:text-8xl animate-float filter drop-shadow-[0_8px_16px_rgba(0,0,0,0.25)] relative">
                            <i class="fa-solid fa-cloud-sun"></i>
                        </div>
                        <div>
                            <div class="text-6xl md:text-7xl font-black tracking-tighter relative inline-block">
                                <span id="temp-display">--</span><span class="text-3xl absolute -top-1 -right-5">°</span>
                            </div>
                            <p id="weather-desc" class="text-lg font-medium capitalize mt-1 opacity-90">---</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-amber-300"><i class="fa-solid fa-sun"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Восход</p>
                            <p id="sunrise" class="text-sm font-semibold">--:--</p>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-orange-400"><i class="fa-solid fa-moon"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Закат</p>
                            <p id="sunset" class="text-sm font-semibold">--:--</p>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-blue-300"><i class="fa-solid fa-droplet"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Влажность</p>
                            <p id="humidity" class="text-sm font-semibold">-- %</p>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5">
                        <div class="text-xl opacity-80 w-8 text-center text-teal-300"><i class="fa-solid fa-wind"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Ветер</p>
                            <p id="wind-speed" class="text-sm font-semibold">-- м/с</p>
                        </div>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-3 flex items-center space-x-3 border border-white/5 col-span-2">
                        <div class="text-xl opacity-80 w-8 text-center text-rose-300"><i class="fa-solid fa-gauge-high"></i></div>
                        <div>
                            <p class="text-xs opacity-60 font-medium">Атмосферное давление</p>
                            <p id="pressure" class="text-sm font-semibold">-- мм рт. ст.</p>
                        </div>
                    </div>
                </div>

            </div>

            <div id="hourly-container" class="mt-6 pt-5 border-t border-white/10 hidden">
                <h3 class="text-sm font-bold uppercase tracking-wider mb-3 opacity-90 flex items-center gap-2">
                    <i class="fa-regular fa-clock text-sky-400"></i> Почасовой прогноз на выбранные сутки
                </h3>
                <div id="hourly-list" class="flex gap-3 overflow-x-auto pb-3 hourly-scroll scroll-smooth"></div>
            </div>
        </div>

        <div id="forecast-container" class="weather-card rounded-3xl p-6 border border-white/10 opacity-0 transition-all duration-700 hidden">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-calendar-days text-sky-400"></i> Прогноз на 10 дней вперед
            </h2>
            <div id="forecast-days" class="flex flex-col gap-2.5 max-h-[450px] overflow-y-auto pr-1 hourly-scroll"></div>
        </div>

        <div class="weather-card p-4 rounded-2xl border border-white/10 shadow-lg">
            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between w-full">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <i class="fa-solid fa-sliders text-sky-400 text-sm"></i>
                    <span class="text-xs font-semibold opacity-80 whitespace-nowrap">Провайдер данных:</span>
                    <select id="engine-select" onchange="changeEngine(this.value)" class="bg-black/30 border border-white/15 text-xs rounded-xl px-2.5 py-1.5 text-white focus:outline-none focus:border-sky-400 cursor-pointer">
                        <option value="openmeteo" class="bg-slate-800">Open-Meteo (Без ключа)</option>
                        <option value="weatherapi" class="bg-slate-800">WeatherAPI (Нужен ключ)</option>
                    </select>
                </div>
                
                <div id="key-input-container" class="w-full sm:w-auto hidden flex-1 sm:flex-none max-w-xs">
                    <input type="password" id="weatherapi-key" oninput="saveApiKey(this.value)" placeholder="Вставьте ваш WeatherAPI Ключ" class="w-full bg-black/30 border border-white/15 rounded-xl px-3 py-1.5 text-xs text-white placeholder-white/40 focus:outline-none focus:border-sky-400">
                </div>
            </div>
        </div>

    </div>

    <script>
        const DEFAULT_COORDS = { lat: 44.9521, lon: 34.1024, name: "Симферополь" };
        let currentCoords = null;
        let globalForecastData = []; 
        let currentCityName = "Симферополь";
        
        let currentEngine = localStorage.getItem('weather_engine') || 'openmeteo';
        let weatherApiKey = localStorage.getItem('weather_api_key') || '';

        const weatherThemes = {
            Clear: { bg: "from-amber-500 via-orange-500 to-sky-600", icon: '<i class="fa-solid fa-sun text-amber-200"></i>', badge: "bg-amber-500/30 text-amber-100", effect: "sun", name: "Ясно" },
            Clouds: { bg: "from-sky-500 via-slate-500 to-slate-700", icon: '<i class="fa-solid fa-cloud text-slate-100"></i>', badge: "bg-slate-500/30 text-slate-100", effect: "none", name: "Облачно" },
            Rain: { bg: "from-slate-700 via-blue-800 to-indigo-950", icon: '<i class="fa-solid fa-cloud-showers-heavy text-blue-300"></i>', badge: "bg-blue-500/30 text-blue-100", effect: "rain", name: "Дождь" },
            Snow: { bg: "from-blue-900 via-indigo-950 to-slate-800", icon: '<i class="fa-solid fa-snowflake text-sky-200"></i>', badge: "bg-sky-500/30 text-sky-100", effect: "snow", name: "Снег" }
        };

        function parseWmo(code) {
            if ([0, 1].includes(code)) return { type: 'Clear', desc: 'Ясно' };
            if ([2, 3].includes(code)) return { type: 'Clouds', desc: 'Облачно' };
            if ([45, 48].includes(code)) return { type: 'Clouds', desc: 'Туман' };
            if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82, 95, 96, 99].includes(code)) return { type: 'Rain', desc: 'Осадки' };
            if ([71, 73, 75, 77, 85, 86].includes(code)) return { type: 'Snow', desc: 'Снегопад' };
            return { type: 'Clouds', desc: 'Облачно' };
        }

        function parseWeatherApiCode(code) {
            if (code === 1000) return { type: 'Clear', desc: 'Ясно' };
            if ([1003, 1006, 1009, 1030, 1135, 1147].includes(code)) return { type: 'Clouds', desc: 'Облачно / Туман' };
            if ([1063, 1150, 1153, 1180, 1183, 1186, 1189, 1192, 1195, 1240, 1243, 1246].includes(code)) return { type: 'Rain', desc: 'Дождь' };
            if ([1066, 1114, 1117, 1210, 1213, 1216, 1219, 1222, 1225, 1255, 1258].includes(code)) return { type: 'Snow', desc: 'Снег' };
            return { type: 'Clouds', desc: 'Облачно' };
        }

        function initEngineUI() {
            const select = document.getElementById('engine-select');
            const keyContainer = document.getElementById('key-input-container');
            const keyInput = document.getElementById('weatherapi-key');
            
            select.value = currentEngine;
            keyInput.value = weatherApiKey;
            
            if (currentEngine === 'weatherapi') {
                keyContainer.classList.remove('hidden');
            } else {
                keyContainer.classList.add('hidden');
            }
        }

        function changeEngine(val) {
            currentEngine = val;
            localStorage.setItem('weather_engine', val);
            initEngineUI();
            if (currentCoords) fetchWeatherData(currentCoords.lat, currentCoords.lon);
        }

        function saveApiKey(val) {
            weatherApiKey = val;
            localStorage.setItem('weather_api_key', val);
            if (currentCoords && currentEngine === 'weatherapi' && val.length > 5) {
                fetchWeatherData(currentCoords.lat, currentCoords.lon);
            }
        }

        function initWeatherAutomatically() {
            initEngineUI();
            const gpsIcon = document.getElementById('gps-icon');
            if(gpsIcon) gpsIcon.classList.add('animate-spin');
            document.getElementById('location-status').innerText = "Поиск координат...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async position => {
                        currentCoords = { lat: position.coords.latitude, lon: position.coords.longitude };
                        document.getElementById('location-status').innerText = "Координаты получены";
                        if(gpsIcon) gpsIcon.classList.remove('animate-spin');
                        
                        await fetchCityNameByCoords(currentCoords.lat, currentCoords.lon);
                        fetchWeatherData(currentCoords.lat, currentCoords.lon);
                    },
                    error => {
                        useDefaultLocation("Симферополь (По умолчанию)");
                    },
                    { timeout: 4000 }
                );
            } else {
                useDefaultLocation("GPS не поддерживается");
            }
        }

        function useDefaultLocation(msg) {
            const gpsIcon = document.getElementById('gps-icon');
            if(gpsIcon) gpsIcon.classList.remove('animate-spin');
            currentCoords = { lat: DEFAULT_COORDS.lat, lon: DEFAULT_COORDS.lon };
            currentCityName = DEFAULT_COORDS.name;
            document.getElementById('location-status').innerText = msg;
            fetchWeatherData(currentCoords.lat, currentCoords.lon);
        }

        async function fetchCityNameByCoords(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ru`);
                if (res.ok) {
                    const data = await res.json();
                    currentCityName = data.address.city || data.address.town || data.address.village || "Определенное место";
                    return;
                }
            } catch (e) { console.error(e); }
            currentCityName = "Текущее местоположение"; 
        }

        async function handleSearch(e) {
            e.preventDefault();
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            document.getElementById('location-status').innerText = "Поиск...";
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=ru&format=json`);
                const data = await res.json();
                
                if (data.results && data.results.length > 0) {
                    const result = data.results[0];
                    currentCoords = { lat: result.latitude, lon: result.longitude };
                    currentCityName = result.name;
                    document.getElementById('location-status').innerText = "Город найден";
                    fetchWeatherData(currentCoords.lat, currentCoords.lon);
                } else {
                    document.getElementById('location-status').innerText = "Город не найден";
                }
            } catch (err) {
                document.getElementById('location-status').innerText = "Ошибка поиска";
            }
        }

        async function fetchWeatherData(lat, lon) {
            document.getElementById('location-status').innerText = "Обновление данных...";
            try {
                if (currentEngine === 'weatherapi') {
                    if (!weatherApiKey) {
                        document.getElementById('location-status').innerText = "Введите API ключ!";
                        return;
                    }
                    await fetchWeatherApiData(lat, lon);
                } else {
                    await fetchOpenMeteoData(lat, lon);
                }
                
                updateWeatherUI(0, true); // По умолчанию открываем сегодняшний день (index 0) и активируем автоскролл часов
                renderForecastList();
                
                showAppCards();
                document.getElementById('location-status').innerText = "Данные обновлены";
            } catch (err) {
                console.error(err);
                document.getElementById('location-status').innerText = "Ошибка провайдера погоды";
            }
        }

        // Запрос через Open-Meteo (10 дней)
        async function fetchOpenMeteoData(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,pressure_msl,wind_speed_10m&hourly=temperature_2m,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&wind_speed_unit=ms&timezone=auto&forecast_days=10`;
            const response = await fetch(url);
            const data = await response.json();

            globalForecastData = data.daily.time.map((dateStr, idx) => {
                const wmoInfo = parseWmo(data.daily.weather_code[idx]);
                const dateObj = new Date(dateStr);
                
                // Нарезка почасового прогноза по 24 часа для каждых суток отдельно
                let hourlyList = [];
                const startHourIdx = idx * 24;
                for (let i = 0; i < 24; i++) {
                    const hIdx = startHourIdx + i;
                    if (data.hourly.time[hIdx]) {
                        hourlyList.push({
                            time: data.hourly.time[hIdx].slice(11, 16),
                            hourNumber: i,
                            temp: Math.round(data.hourly.temperature_2m[hIdx]),
                            pop: data.hourly.precipitation_probability[hIdx] || 0,
                            iconCode: parseWmo(data.hourly.weather_code[hIdx]).type
                        });
                    }
                }

                return {
                    isToday: idx === 0,
                    city: currentCityName,
                    dateStr: dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }),
                    dayName: dateObj.toLocaleDateString('ru-RU', { weekday: 'long' }),
                    temp: idx === 0 ? Math.round(data.current.temperature_2m) : Math.round((data.daily.temperature_2m_max[idx] + data.daily.temperature_2m_min[idx]) / 2),
                    maxTemp: Math.round(data.daily.temperature_2m_max[idx]),
                    minTemp: Math.round(data.daily.temperature_2m_min[idx]),
                    desc: wmoInfo.desc,
                    humidity: idx === 0 ? data.current.relative_humidity_2m : 65,
                    wind: idx === 0 ? Number(data.current.wind_speed_10m.toFixed(1)) : 4.0,
                    pressure: idx === 0 ? Math.round(data.current.pressure_msl * 0.750062) : 755,
                    sunrise: data.daily.sunrise[idx] ? data.daily.sunrise[idx].slice(11, 16) : '--:--',
                    sunset: data.daily.sunset[idx] ? data.daily.sunset[idx].slice(11, 16) : '--:--',
                    type: wmoInfo.type,
                    hourly: hourlyList
                };
            });
        }

        // Запрос через WeatherAPI (Запрашивает до 10 дней в зависимости от тарифного плана ключа)
        async function fetchWeatherApiData(lat, lon) {
            const url = `https://api.weatherapi.com/v1/forecast.json?key=${weatherApiKey}&q=${lat},${lon}&days=10&lang=ru`;
            const response = await fetch(url);
            if(!response.ok) throw new Error("WeatherAPI Key error or limit");
            const data = await response.json();

            globalForecastData = data.forecast.forecastday.map((fDay, idx) => {
                const weatherInfo = parseWeatherApiCode(fDay.day.condition.code);
                const dateObj = new Date(fDay.date);

                let hourlyList = fDay.hour.map((h, hIdx) => {
                    return {
                        time: h.time.slice(11, 16),
                        hourNumber: hIdx,
                        temp: Math.round(h.temp_c),
                        pop: h.chance_of_rain || h.chance_of_snow || 0,
                        iconCode: parseWeatherApiCode(h.condition.code).type
                    };
                });

                return {
                    isToday: idx === 0,
                    city: data.location.name,
                    dateStr: dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }),
                    dayName: dateObj.toLocaleDateString('ru-RU', { weekday: 'long' }),
                    temp: idx === 0 ? Math.round(data.current.temp_c) : Math.round(fDay.day.avgtemp_c),
                    maxTemp: Math.round(fDay.day.maxtemp_c),
                    minTemp: Math.round(fDay.day.mintemp_c),
                    desc: idx === 0 ? data.current.condition.text : fDay.day.condition.text,
                    humidity: idx === 0 ? data.current.humidity : fDay.day.avghumidity,
                    wind: idx === 0 ? Number((data.current.wind_kph / 3.6).toFixed(1)) : Number((fDay.day.maxwind_kph / 3.6).toFixed(1)),
                    pressure: idx === 0 ? Math.round(data.current.pressure_mb * 0.750062) : 755,
                    sunrise: fDay.astro.sunrise ? convertAstroTime(fDay.astro.sunrise) : '--:--',
                    sunset: fDay.astro.sunset ? convertAstroTime(fDay.astro.sunset) : '--:--',
                    type: weatherInfo.type,
                    hourly: hourlyList
                };
            });
        }

        function convertAstroTime(timeStr) {
            try {
                const [time, modifier] = timeStr.split(' ');
                let [hours, minutes] = time.split(':');
                if (hours === '12') hours = '00';
                if (modifier === 'PM') hours = parseInt(hours, 10) + 12;
                return `${String(hours).padStart(2, '0')}:${minutes}`;
            } catch(e) { return timeStr; }
        }

        function updateWeatherUI(index, triggerScroll = false) {
            const w = globalForecastData[index];
            if (!w) return;

            const theme = weatherThemes[w.type] || weatherThemes.Clouds;
            document.body.className = `min-h-screen flex flex-col items-center justify-start p-4 md:p-8 transition-all duration-1000 font-sans text-white overflow-x-hidden relative bg-gradient-to-br ${theme.bg}`;
            
            document.getElementById('city-name').innerText = w.city;
            document.getElementById('current-date').innerText = `${w.dayName}, ${w.dateStr}`;
            document.getElementById('temp-display').innerText = w.temp;
            document.getElementById('weather-desc').innerText = w.desc;
            document.getElementById('humidity').innerText = `${w.humidity} %`;
            document.getElementById('wind-speed').innerText = `${w.wind} м/с`;
            document.getElementById('pressure').innerText = `${w.pressure} мм`;
            document.getElementById('sunrise').innerText = w.sunrise;
            document.getElementById('sunset').innerText = w.sunset;

            const badge = document.getElementById('weather-status-badge');
            badge.innerText = theme.name;
            badge.className = `inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider ${theme.badge}`;
            document.getElementById('weather-icon-container').innerHTML = theme.icon;

            // Сборка почасовой карусели
            const hourlyContainer = document.getElementById('hourly-container');
            const hourlyListContainer = document.getElementById('hourly-list');
            
            if (w.hourly && w.hourly.length > 0) {
                hourlyContainer.classList.remove('hidden');
                hourlyListContainer.innerHTML = '';
                
                const currentHourSystem = new Date().getHours();

                w.hourly.forEach(h => {
                    let hIcon = '<i class="fa-solid fa-cloud text-slate-200"></i>';
                    if (h.iconCode === 'Clear') hIcon = '<i class="fa-solid fa-sun text-amber-300"></i>';
                    if (h.iconCode === 'Rain') hIcon = '<i class="fa-solid fa-cloud-rain text-blue-300"></i>';
                    if (h.iconCode === 'Snow') hIcon = '<i class="fa-solid fa-snowflake text-sky-300"></i>';
                    
                    const isPassed = w.isToday && h.hourNumber < currentHourSystem;
                    const isCurrent = w.isToday && h.hourNumber === currentHourSystem;

                    const item = document.createElement('div');
                    item.id = `hour-card-${h.hourNumber}`;
                    
                    // Прошедшие часы слегка затеняем для визуального разделения
                    item.className = `flex flex-col items-center border rounded-xl px-4 py-2.5 min-w-[76px] text-center text-xs transition-all duration-300 
                        ${isCurrent ? 'bg-sky-500/30 border-sky-400 scale-105 shadow-md' : 'bg-white/5 border-white/5'} 
                        ${isPassed ? 'opacity-40 filter grayscale-[30%]' : ''}`;
                    
                    item.innerHTML = `
                        <span class="opacity-60 block font-medium ${isCurrent ? 'text-sky-300 font-bold' : ''}">${h.time}</span>
                        <span class="text-xl my-1.5 block">${hIcon}</span>
                        <span class="font-bold text-sm block">${h.temp}°</span>
                        <span class="text-[10px] text-cyan-300 block font-semibold mt-0.5"><i class="fa-solid fa-droplet text-[8px]"></i> ${h.pop}%</span>
                    `;
                    hourlyListContainer.appendChild(item);
                });

                // Автоматическая прокрутка карусели к текущему времени (прошедшее уходит влево)
                if (w.isToday && triggerScroll) {
                    setTimeout(() => {
                        const targetHourCard = document.getElementById(`hour-card-${currentHourSystem}`);
                        if (targetHourCard) {
                            hourlyListContainer.scrollTo({
                                left: targetHourCard.offsetLeft - hourlyListContainer.offsetLeft - 10,
                                behavior: 'smooth'
                            });
                        }
                    }, 200);
                } else if (!w.isToday) {
                    // Для будущих дней скроллим ленту в начало (на 00:00)
                    hourlyListContainer.scrollLeft = 0;
                }
            } else {
                hourlyContainer.classList.add('hidden');
            }

            generateParticles(theme.effect);

            document.querySelectorAll('.forecast-item').forEach((item, idx) => {
                if (idx === index) item.classList.add('active');
                else item.classList.remove('active');
            });
        }

        function renderForecastList() {
            const container = document.getElementById('forecast-days');
            container.innerHTML = '';

            globalForecastData.forEach((day, index) => {
                const theme = weatherThemes[day.type] || weatherThemes.Clouds;
                const row = document.createElement('button');
                row.onclick = () => updateWeatherUI(index, false); // При ручном клике на карточку дня скролл часов не сбрасываем насильно
                row.className = "forecast-item w-full bg-white/5 border border-white/5 p-4 rounded-2xl flex items-center justify-between gap-4 transition text-left cursor-pointer";
                
                row.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="text-2xl w-10 text-center filter drop-shadow-sm">${theme.icon}</div>
                        <div>
                            <span class="block text-sm font-bold capitalize">${day.dayName}</span>
                            <span class="block text-xs opacity-65">${day.dateStr} — ${day.desc}</span>
                        </div>
                    </div>
                    <div class="text-right whitespace-nowrap">
                        <span class="text-base font-black text-amber-300">${day.maxTemp}°</span>
                        <span class="text-xs opacity-40 mx-1">/</span>
                        <span class="text-sm font-semibold opacity-60 text-blue-200">${day.minTemp}°</span>
                    </div>
                `;
                container.appendChild(row);
            });

            if(container.firstChild) container.firstChild.classList.add('active');
        }

        function generateParticles(effectType) {
            const container = document.getElementById('effects-container');
            container.innerHTML = '';
            if (effectType === 'none') return;

            if (effectType === 'sun') {
                const rays = document.createElement('div');
                rays.className = 'sun-rays';
                container.appendChild(rays);
            }
            if (effectType === 'rain') {
                const flash = document.createElement('div');
                flash.className = 'lightning-flash';
                container.appendChild(flash);
            }
            if (effectType === 'rain' || effectType === 'snow') {
                const particleCount = effectType === 'rain' ? 60 : 30;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = effectType === 'rain' ? 'raindrop' : 'snowflake';
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * -15}%`;
                    particle.style.animationDuration = effectType === 'rain' ? `${0.4 + Math.random() * 0.4}s` : `${3 + Math.random() * 4}s`;
                    particle.style.animationDelay = `${Math.random() * 5}s`;
                    container.appendChild(particle);
                }
            }
        }

        function showAppCards() {
            const appCard = document.getElementById('weather-app');
            const forecastCard = document.getElementById('forecast-container');
            if(appCard) appCard.classList.remove('hidden');
            if(forecastCard) forecastCard.classList.remove('hidden');
            setTimeout(() => {
                if(appCard) appCard.classList.add('opacity-100');
                if(forecastCard) forecastCard.classList.add('opacity-100');
            }, 50);
        }

        window.onload = initWeatherAutomatically;
    </script>
</body>
</html>
